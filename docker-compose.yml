version: "3.9"

services:

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persists chroma_store & models
    env_file:
      - .env
    depends_on:
      - mlflow
    restart: unless-stopped

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
